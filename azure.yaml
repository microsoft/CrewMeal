name: crewmeal
metadata:
  template: crewmeal@0.1.0
infra:
  provider: bicep
  path: infra
  module: main
services:
  web:
    project: .
    language: docker
    host: containerapp
    docker:
      path: ./Dockerfile
      remoteBuild: true
  worker:
    project: .
    language: docker
    host: containerapp
    docker:
      path: ./Dockerfile
      remoteBuild: true
